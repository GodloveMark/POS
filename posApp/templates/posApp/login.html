{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page_title %}{{ page_title }}{% else %}Login{% endif %} | POS System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="shortcut icon" href="{% static 'posApp/assets/material-admin/images/favicon.png' %}" />
    
    <link rel="stylesheet" href="{% static 'posApp/assets/bootstrap/css/bootstrap.min.css' %}">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7f6;
            background-image: var(--primary-gradient);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
        }

        .login-logo {
            width: 70px;
            height: 70px;
            background: var(--primary-gradient);
            color: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            transition: all 0.3s;
        }

        .form-control:focus {
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            border-color: #667eea;
        }

        .btn-login {
            background: var(--primary-gradient);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: transform 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }

        /* Preloader Style */
        #preloader {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #fff;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div id="preloader">
        <div class="spinner-border text-primary" role="status"></div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 d-flex justify-content-center">
                <div class="login-card">
                    <div class="text-center">
                        <div class="login-logo">
                            <i class="fas fa-cash-register"></i>
                        </div>
                        <h4 class="fw-bold text-dark mb-1">Welcome Back</h4>
                        <p class="text-muted small mb-4">Please enter your details to sign in</p>
                    </div>

                    <form id="login-user">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 text-muted small"><i class="fas fa-user"></i></span>
                                <input type="text" name="username" class="form-control border-start-0 ps-0 shadow-none" placeholder="Username" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 text-muted small"><i class="fas fa-lock"></i></span>
                                <input type="password" name="password" class="form-control border-start-0 ps-0 shadow-none" placeholder="••••••••" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-login mb-3">
                            Sign In <i class="fas fa-sign-in-alt ms-2"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'posApp/assets/default/js/jquery-3.6.0.min.js' %}"></script>
    <script src="{% static 'posApp/assets/bootstrap/js/bootstrap.bundle.min.js' %}"></script>

    <script>
        // Preloader Logic
        $(window).on('load', function() {
            $('#preloader').fadeOut('slow');
        });

        window.start_loader = function() { $('body').css('opacity', '0.7'); }
        window.end_loader = function() { $('body').css('opacity', '1'); }

        $(function() {
            $('#login-user').submit(function(e) {
                e.preventDefault();
                var _this = $(this);
                $('.alert').remove();
                
                var el = $('<div class="alert alert-danger py-2 small shadow-sm mb-3">');
                
                start_loader();
                $.ajax({
                    headers: { "X-CSRFToken": '{{csrf_token}}' },
                    url: "{% url 'login-user' %}",
                    data: new FormData($(this)[0]),
                    cache: false,
                    contentType: false,
                    processData: false,
                    method: 'POST',
                    dataType: 'json',
                    error: err => {
                        console.log(err);
                        alert("An error occurred");
                        end_loader();
                    },
                    success: function(resp) {
                        if (resp.status === 'success') {
                            location.href = resp.redirect_url || "{% url 'home-page' %}";
                        } else {
                            el.text(resp.msg || "Invalid credentials");
                            _this.prepend(el);
                            end_loader();
                        }
                    }
                });
            });
        });
    </script>
</body>
</html>
