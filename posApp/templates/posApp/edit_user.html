{% extends "posApp/base_admin.html" %}
{% block pageContent %}

<div class="mdc-layout-grid__cell stretch-card mdc-layout-grid__cell--span-12">
    <div class="mdc-card py-2">
        <div class="d-flex justify-content-between align-items-center">
            <h4 class="card-title mb-0">Edit User</h4>
            <div class="text-start">
                <a href="{% url 'user_list' %}" class="btn btn-secondary bg-gradient btn-sm rounded-0">
                    <i class="mdi mdi-arrow-left"></i><span> Back to List</span>
                </a>
            </div>
        </div>
    </div>
</div>

<div class="mdc-layout-grid__cell stretch-card mdc-layout-grid__cell--span-12">
    <div class="mdc-card p-4">
        <form method="POST" class="row g-3">
            {% csrf_token %}

            <!-- Username -->
            <div class="col-md-6">
                <label for="id_username" class="form-label fw-bold">Username</label>
                <input type="text" name="username" id="id_username" 
                       class="form-control" value="{{ user_obj.username }}" required>
            </div>

            <!-- Role -->
            <div class="col-md-6">
                <label for="id_role" class="form-label fw-bold">Role</label>
                <select name="role" id="id_role" class="form-select" required>
                    <option value="manager" {% if user_obj.role == 'manager' %}selected{% endif %}>Manager</option>
                    <option value="cashier" {% if user_obj.role == 'cashier' %}selected{% endif %}>Cashier</option>
                </select>
            </div>

            <!-- Store -->
            <div class="col-md-6">
                <label for="id_store" class="form-label fw-bold">Store</label>
                <select name="store_id" id="id_store" class="form-select" required>
                    {% for store in stores %}
                        <option value="{{ store.id }}" {% if assigned_store and store.id == assigned_store.id %}selected{% endif %}>
                            {{ store.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Password -->
            <div class="col-md-6">
                <label for="id_password" class="form-label fw-bold">New Password</label>
                <input type="password" name="password" id="id_password" 
                       class="form-control" placeholder="Leave blank to keep current">
            </div>

            <!-- Actions -->
            <div class="col-12 mt-3">
                <button type="submit" class="btn btn-primary bg-gradient rounded-0">
                    <i class="mdi mdi-content-save"></i> Update User
                </button>
                <a href="{% url 'user_list' %}" class="btn btn-secondary bg-gradient rounded-0">
                    <i class="mdi mdi-close"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock pageContent %}
